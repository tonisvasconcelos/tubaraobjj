# Render Blueprint (optional). Use Dashboard to add Web Service + PostgreSQL instead.
services:
  - type: web
    name: tubarao-bjj-api
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tubarao-bjj-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: API_PUBLIC_URL
        sync: false

databases:
  - name: tubarao-bjj-db
    plan: free
